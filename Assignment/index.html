<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap and JS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Custom JS -->
    <script src="index.js" defer></script>
</head>

<body class="bg">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow" style="width: 350px;">
            <h3 class="text-center mb-3">Login</h3>
            <form id="loginForm" action="Frontpage.html" method="get">

                <div class="mb-3">
                    <!--User must enter username, can be any name, as long as not empty-->
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required name="username"
                        placeholder="'Any username'">
                </div>

                <div class="mb-3">
                    <!--User must enter password, for now, must be "Umamusume"-->
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required name="password"
                        placeholder="umamusume">
                </div>

                <!--Login button-->
                <button type="submit" class="btn btn-success w-100">Login</button>
            </form>

        </div>
    </div>

</body>

</html>
